# EcoReport AI — Pipeline Configuration
# All parameters are documented. Edit freely to reconfigure the pipeline.

# ── Global ────────────────────────────────────────────────────────────────────
seed: 42
log_level: "INFO"

# ── Data ─────────────────────────────────────────────────────────────────────
data:
  fred_series:
    - CPIAUCSL    # Consumer Price Index (All Urban Consumers)
    - UNRATE      # Civilian Unemployment Rate
    - FEDFUNDS    # Effective Federal Funds Rate
  start_date: "2000-01-01"
  end_date: null          # null = use latest available date
  sample_csv_path: "data/sample_macro.csv"
  source: "auto"          # "auto" | "fred" | "sample"

# ── Feature Engineering ───────────────────────────────────────────────────────
features:
  max_lag: 6              # Number of lag periods per series
  rolling_windows:
    - 3
    - 6
    - 12
  use_differencing: false # First-difference features (for ARIMA stationarity)
  target_column: "cpi_yoy"

# ── Models ────────────────────────────────────────────────────────────────────
models:
  ols:
    enabled: true
    formula: "cpi_yoy ~ fedfunds + unrate + cpi_yoy_lag_1 + cpi_yoy_lag_3"
    hac_lags: 6           # Newey-West lags for HAC correction

  arima:
    enabled: true
    max_p: 3
    max_q: 2
    seasonal: false       # Set true for SARIMAX
    seasonal_period: 12

  gradient_boosting:
    enabled: true
    variant: "gradient_boosting"  # "gradient_boosting" | "random_forest"
    n_iter_search: 20     # RandomizedSearchCV iterations
    cv_folds: 3

  lstm:
    enabled: true
    lookback: 12          # Sliding window length (months)
    hidden_size: 64
    num_layers: 2
    dropout: 0.2
    batch_size: 32
    max_epochs: 200
    patience: 10          # Early stopping patience
    learning_rate: 0.001
    val_split: 0.15       # Fraction of training data used for validation

# ── Evaluation ────────────────────────────────────────────────────────────────
evaluation:
  n_folds: 5              # Rolling-origin CV folds
  forecast_horizon: 6     # Months to forecast per fold
  final_forecast_horizon: 12  # Months to forecast in final report

# ── Reporting ─────────────────────────────────────────────────────────────────
reporting:
  output_dir: "reports"
  figures_dir: "reports/figures"
  report_filename: "latest_report"
  figure_dpi: 150
  figure_style: "seaborn-v0_8-whitegrid"

# ── LLM (Optional) ────────────────────────────────────────────────────────────
llm:
  model: "gpt-4o-mini"
  temperature: 0.3
  max_tokens: 2000
  enabled_if_key: true    # Auto-enable when OPENAI_API_KEY is present
